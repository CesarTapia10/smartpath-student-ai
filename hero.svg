<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#6C63FF"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.2" r="0.6">
      <stop stop-color="#6C63FF" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#6C63FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Constelación -->
  <g stroke="url(#brand)" stroke-width="2" opacity="0.7">
    <line x1="900" y1="315" x2="1020" y2="180"/>
    <line x1="900" y1="315" x2="1060" y2="320"/>
    <line x1="900" y1="315" x2="1010" y2="460"/>
    <line x1="900" y1="315" x2="780" y2="200"/>
    <line x1="900" y1="315" x2="760" y2="430"/>
  </g>
  <g fill="#22D3EE">
    <circle cx="1020" cy="180" r="10"/>
    <circle cx="1060" cy="320" r="8"/>
    <circle cx="1010" cy="460" r="9"/>
  </g>
  <g fill="#8B5CF6">
    <circle cx="780" cy="200" r="9"/>
    <circle cx="760" cy="430" r="10"/>
  </g>
  <circle cx="900" cy="315" r="26" fill="url(#brand)"/>
  <circle cx="900" cy="315" r="11" fill="#fff"/>

  <!-- Texto -->
  <text x="90" y="250" font-family="Sora, sans-serif" font-size="64" font-weight="800" fill="#fff">SmartPath</text>
  <text x="90" y="320" font-family="Sora, sans-serif" font-size="64" font-weight="800" fill="url(#brand)">Student AI</text>
  <text x="92" y="380" font-family="Inter, sans-serif" font-size="28" fill="#9FB0D4">Descubre tu carrera ideal con Inteligencia Artificial</text>
</svg>
